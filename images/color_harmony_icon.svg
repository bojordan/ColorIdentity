<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="iconClip">
    <rect x="80" y="80" width="520" height="520" rx="100"/>
  </clipPath>
</defs>

<rect x="80" y="80" width="520" height="520" rx="100" fill="#2b3240" style="fill:rgb(43, 50, 64);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<g clip-path="url(#iconClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- 8 equal segments, each 45 degrees, r=220, center 340,340 -->
  <!-- Segment angles: 0=top, going clockwise. Start angle offset -90deg so first segment is at top -->
  <!-- seg 1: -90 to -45 deg -->
  <path d="M340 340 L340 120 A220 220 0 0 1 495.57 184.43 Z" fill="#ef9a9a" opacity="0.9" style="fill:rgb(239, 154, 154);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 2: -45 to 0 -->
  <path d="M340 340 L495.57 184.43 A220 220 0 0 1 560 340 Z" fill="#ffcc80" opacity="0.9" style="fill:rgb(255, 204, 128);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 3: 0 to 45 -->
  <path d="M340 340 L560 340 A220 220 0 0 1 495.57 495.57 Z" fill="#fff176" opacity="0.9" style="fill:rgb(255, 241, 118);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 4: 45 to 90 -->
  <path d="M340 340 L495.57 495.57 A220 220 0 0 1 340 560 Z" fill="#80cbc4" opacity="0.9" style="fill:rgb(128, 203, 196);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 5: 90 to 135 -->
  <path d="M340 340 L340 560 A220 220 0 0 1 184.43 495.57 Z" fill="#4fc3f7" opacity="0.9" style="fill:rgb(79, 195, 247);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 6: 135 to 180 -->
  <path d="M340 340 L184.43 495.57 A220 220 0 0 1 120 340 Z" fill="#7986cb" opacity="0.9" style="fill:rgb(121, 134, 203);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 7: 180 to 225 -->
  <path d="M340 340 L120 340 A220 220 0 0 1 184.43 184.43 Z" fill="#ce93d8" opacity="0.9" style="fill:rgb(206, 147, 216);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- seg 8: 225 to 270 -->
  <path d="M340 340 L184.43 184.43 A220 220 0 0 1 340 120 Z" fill="#f48fb1" opacity="0.9" style="fill:rgb(244, 143, 177);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <circle cx="340" cy="340" r="75" fill="#2b3240" style="fill:rgb(43, 50, 64);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="340" r="73" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.5" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<rect x="80" y="80" width="520" height="520" rx="100" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>